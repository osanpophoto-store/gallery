<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おさんぽフォト | 写真ギャラリー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #F7F3EE;
  --warm-white: #FDFAF7;
  --sand: #E8DDD0;
  --bark: #8B6F5C;
  --deep: #2C1F17;
  --forest: #3D5A47;
  --moss: #6B8F6B;
  --dusk: #7A6A8A;
  --accent: #C4956A;
  --danger: #C0392B;
  --serif: 'Shippori Mincho', serif;
  --sans: 'Zen Kaku Gothic New', sans-serif;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(44,31,23,0.10);
  --shadow-lg: 0 12px 48px rgba(44,31,23,0.18);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--deep);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== GRAIN OVERLAY ===== */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.6;
}

/* ===== HEADER ===== */
.site-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(247,243,238,0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(139,111,92,0.12);
}

.logo {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--deep);
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 28px;
  height: 28px;
  background: var(--forest);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 24px;
}

.btn-logout {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--bark);
  background: none;
  border: 1px solid var(--sand);
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
}
.btn-logout:hover { background: var(--sand); }
.btn-logout.visible { display: block; }

/* ===== SCREENS ===== */
.screen {
  display: none;
  min-height: 100vh;
  padding-top: 80px;
}
.screen.active { display: block; }

/* ===== LOGIN SCREEN ===== */
#screen-login {
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-wrap {
  width: 100%;
  max-width: 480px;
  padding: 24px;
}

.login-hero {
  text-align: center;
  margin-bottom: 48px;
}

.login-hero h1 {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 500;
  color: var(--deep);
  line-height: 1.4;
  margin-bottom: 12px;
}

.login-hero p {
  font-size: 14px;
  color: var(--bark);
  line-height: 1.8;
}

.event-cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 32px;
}

.event-card {
  background: var(--warm-white);
  border: 1.5px solid var(--sand);
  border-radius: var(--radius);
  padding: 20px 24px;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.event-card:hover {
  border-color: var(--bark);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}

.event-card.selected {
  border-color: var(--forest);
  background: #F0F5F1;
}

.event-info h3 {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 4px;
}

.event-info p {
  font-size: 12px;
  color: var(--bark);
}

.event-badge {
  font-size: 11px;
  color: var(--moss);
  background: #EDF3ED;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.pw-section {
  background: var(--warm-white);
  border: 1.5px solid var(--sand);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.pw-section label {
  display: block;
  font-size: 12px;
  color: var(--bark);
  margin-bottom: 10px;
  letter-spacing: 0.06em;
}

.pw-input-wrap {
  position: relative;
}

.pw-input {
  width: 100%;
  padding: 14px 48px 14px 18px;
  border: 1.5px solid var(--sand);
  border-radius: 8px;
  font-size: 16px;
  font-family: var(--sans);
  background: var(--cream);
  color: var(--deep);
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}

.pw-input:focus { border-color: var(--forest); }
.pw-input.error { border-color: var(--danger); }

.pw-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--bark);
  font-size: 18px;
  padding: 4px;
}

.error-msg {
  font-size: 12px;
  color: var(--danger);
  margin-top: 8px;
  display: none;
}
.error-msg.visible { display: block; }

.btn-primary {
  width: 100%;
  padding: 16px;
  background: var(--forest);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
  position: relative;
  overflow: hidden;
}

.btn-primary:hover:not(:disabled) {
  background: #2e4536;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(61,90,71,0.3);
}

.btn-primary:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.btn-primary.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shimmer 1s infinite;
}

@keyframes shimmer {
  from { transform: translateX(-100%); }
  to   { transform: translateX(100%); }
}

/* ===== GALLERY SCREEN ===== */
#screen-gallery {
  padding: 100px 0 60px;
}

.gallery-header {
  max-width: 1200px;
  margin: 0 auto 40px;
  padding: 0 40px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.gallery-title h2 {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 500;
  margin-bottom: 6px;
}

.gallery-title p {
  font-size: 13px;
  color: var(--bark);
}

.gallery-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.selection-info {
  font-size: 13px;
  color: var(--forest);
  font-weight: 500;
  min-width: 80px;
}

.btn-download-all {
  padding: 10px 24px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-download-all:hover {
  background: #B07A52;
  box-shadow: 0 4px 16px rgba(196,149,106,0.4);
}

/* グリッド */
.photo-grid {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.photo-item {
  position: relative;
  cursor: pointer;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--sand);
  aspect-ratio: 3/4;
  box-shadow: 0 2px 12px rgba(44,31,23,0.08);
  transition: all 0.25s;
}

.photo-item:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}

.photo-item.selected {
  outline: 3px solid var(--forest);
  outline-offset: 2px;
}

.photo-item.selected::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(61,90,71,0.15);
  z-index: 2;
  pointer-events: none;
}

.photo-item canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.photo-check {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 26px;
  height: 26px;
  background: var(--forest);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 3;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.photo-check::after {
  content: '✓';
  color: white;
  font-size: 14px;
  line-height: 1;
}

.photo-item.selected .photo-check { display: flex; }

.photo-num {
  position: absolute;
  bottom: 8px;
  left: 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.8);
  z-index: 3;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  letter-spacing: 0.04em;
}

.photo-skeleton {
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, var(--sand) 25%, #F0E8DF 50%, var(--sand) 75%);
  background-size: 200% 100%;
  animation: skel 1.2s infinite;
}

@keyframes skel {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

/* ===== CART PANEL ===== */
.cart-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: var(--deep);
  color: white;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  gap: 24px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  flex-wrap: wrap;
}

.cart-panel.visible { transform: translateY(0); }

.cart-count {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 500;
  min-width: 80px;
}

.cart-count span {
  font-size: 13px;
  font-family: var(--sans);
  font-weight: 300;
  color: rgba(255,255,255,0.6);
  margin-left: 4px;
}

.cart-price-detail {
  flex: 1;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  line-height: 1.8;
}

.cart-total {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 600;
  color: #F2C98A;
}

.cart-total small {
  font-family: var(--sans);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  font-weight: 300;
}

.btn-pay {
  padding: 14px 32px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-pay:hover {
  background: #B07A52;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(196,149,106,0.4);
}

/* ===== PAYMENT MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(44,31,23,0.6);
  backdrop-filter: blur(4px);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.modal-overlay.visible { display: flex; }

.modal-box {
  background: var(--warm-white);
  border-radius: 20px;
  padding: 40px;
  max-width: 480px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-box h3 {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 8px;
}

.modal-box p {
  font-size: 13px;
  color: var(--bark);
  line-height: 1.8;
  margin-bottom: 24px;
}

.price-breakdown {
  background: var(--cream);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 24px;
}

.price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: var(--bark);
  padding: 4px 0;
}

.price-row.total {
  border-top: 1px solid var(--sand);
  margin-top: 10px;
  padding-top: 12px;
  font-size: 18px;
  color: var(--deep);
  font-family: var(--serif);
  font-weight: 500;
}

.modal-actions {
  display: flex;
  gap: 12px;
}

.btn-cancel {
  flex: 1;
  padding: 14px;
  background: none;
  border: 1.5px solid var(--sand);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--sans);
  cursor: pointer;
  color: var(--bark);
  transition: all 0.2s;
}

.btn-cancel:hover { background: var(--sand); }

.btn-stripe {
  flex: 2;
  padding: 14px;
  background: var(--forest);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-decoration: none;
}

.btn-stripe:hover {
  background: #2e4536;
  box-shadow: 0 6px 20px rgba(61,90,71,0.3);
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  top: 90px;
  right: 24px;
  z-index: 500;
  background: var(--deep);
  color: white;
  padding: 14px 20px;
  border-radius: 10px;
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  transform: translateX(120%);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 280px;
}

.toast.visible { transform: translateX(0); }
.toast.success { border-left: 4px solid var(--moss); }
.toast.error   { border-left: 4px solid var(--danger); }

/* ===== EMPTY / LOADING ===== */
.loading-wrap {
  text-align: center;
  padding: 80px 20px;
  color: var(--bark);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--sand);
  border-top-color: var(--forest);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .site-header { padding: 16px 20px; }
  .gallery-header { padding: 0 20px; }
  .photo-grid { padding: 0 20px; gap: 10px; grid-template-columns: repeat(2, 1fr); }
  .cart-panel { padding: 16px 20px; gap: 12px; }
  .cart-count { font-size: 18px; }
  .modal-box { padding: 28px 20px; }
  .login-wrap { padding: 16px; }
  .login-hero h1 { font-size: 24px; }
}
</style>
</head>
<body>

<!-- ヘッダー -->
<header class="site-header">
  <div class="logo">
    <div class="logo-icon">🌿</div>
    おさんぽフォト
  </div>
  <nav class="header-nav">
    <button class="btn-logout" id="btn-logout" onclick="logout()">ログアウト</button>
  </nav>
</header>

<!-- ========== ログイン画面 ========== -->
<main class="screen active" id="screen-login">
  <div class="login-wrap">
    <div class="login-hero">
      <h1>写真を<br>選んでください</h1>
      <p>撮影イベントを選択し、<br>お知らせしたパスワードを入力してください</p>
    </div>

    <!-- イベント一覧 -->
    <div class="event-cards" id="event-list">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p>イベントを読み込み中...</p>
      </div>
    </div>

    <!-- パスワード入力（イベント選択後に表示） -->
    <div class="pw-section" id="pw-section" style="display:none;">
      <label>パスワード</label>
      <div class="pw-input-wrap">
        <input
          type="password"
          class="pw-input"
          id="pw-input"
          placeholder="••••••••"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter') doLogin()"
        >
        <button class="pw-toggle" onclick="togglePwVisibility()" type="button">👁</button>
      </div>
      <p class="error-msg" id="error-msg"></p>
    </div>

    <button class="btn-primary" id="btn-login" onclick="doLogin()" disabled>
      ギャラリーを開く
    </button>
  </div>
</main>

<!-- ========== ギャラリー画面 ========== -->
<main class="screen" id="screen-gallery">
  <div class="gallery-header">
    <div class="gallery-title">
      <h2 id="gallery-event-name">-</h2>
      <p id="gallery-subtitle">写真をタップして選択 → まとめて購入できます</p>
    </div>
    <div class="gallery-actions">
      <span class="selection-info" id="selection-info"></span>
      <button class="btn-download-all" onclick="openPaymentModal(true)">
        📦 丸ごとダウンロード ¥2,000
      </button>
    </div>
  </div>

  <div class="photo-grid" id="photo-grid">
    <div class="loading-wrap" style="grid-column:1/-1">
      <div class="spinner"></div>
      <p>写真を読み込み中...</p>
    </div>
  </div>
</main>

<!-- ========== カートパネル ========== -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-count" id="cart-count">0<span>枚</span></div>
  <div class="cart-price-detail" id="cart-detail"></div>
  <div class="cart-total" id="cart-total">¥0<small> (税込)</small></div>
  <button class="btn-pay" onclick="openPaymentModal(false)">購入へ進む →</button>
</div>

<!-- ========== 支払いモーダル ========== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <h3 id="modal-title">お支払い確認</h3>
    <p id="modal-desc"></p>

    <div class="price-breakdown" id="price-breakdown"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">戻る</button>
      <a class="btn-stripe" id="btn-stripe" href="#" target="_blank" onclick="onStripeClick()">
        💳 カードで支払う
      </a>
    </div>
  </div>
</div>

<!-- ========== トースト通知 ========== -->
<div class="toast" id="toast"></div>

<script>
// ========================================
// CONFIG - GASのWebアプリURLを設定
// ========================================
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbwv49myiQNYGlFFJbMHLJVpybwXqu6Mz05gi9XrwWBA2hM_WZVU1xhUgJz06DRKkuxW/exec',
  WATERMARK_TEXT: 'おさんぽフォト サンプル',
  WATERMARK_OPACITY: 0.35,
};

// ========================================
// STATE
// ========================================
const state = {
  events: [],
  selectedEventId: null,
  session: null,   // { token, expires, event }
  photos: [],
  selected: new Set(),
  downloadAll: false,
};

// ========================================
// 初期化
// ========================================
window.addEventListener('DOMContentLoaded', async () => {
  // セッション復元
  const saved = sessionStorage.getItem('osanpo_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.expires > Date.now()) {
        state.session = s;
        state.selectedEventId = s.event.id;
        await enterGallery();
        return;
      }
    } catch(e) {}
    sessionStorage.removeItem('osanpo_session');
  }

  await loadEvents();
});

// ========================================
// イベント一覧読み込み
// ========================================
async function loadEvents() {
  try {
    const data = await api('listEvents');
    state.events = data.events || [];
    renderEventList();
  } catch(e) {
    document.getElementById('event-list').innerHTML =
      '<p style="color:var(--danger);font-size:13px;text-align:center">読み込みに失敗しました。ページを再読み込みしてください。</p>';
  }
}

function renderEventList() {
  const el = document.getElementById('event-list');
  if (!state.events.length) {
    el.innerHTML = '<p style="color:var(--bark);font-size:13px;text-align:center">現在公開中のイベントはありません</p>';
    return;
  }

  el.innerHTML = state.events.map(ev => `
    <div class="event-card" id="card-${ev.id}" onclick="selectEvent('${ev.id}')">
      <div class="event-info">
        <h3>${escHtml(ev.name)}</h3>
        <p>${formatDate(ev.date)}</p>
      </div>
      <span class="event-badge">${ev.count}枚</span>
    </div>
  `).join('');
}

function selectEvent(id) {
  state.selectedEventId = id;

  document.querySelectorAll('.event-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card-' + id)?.classList.add('selected');

  const pw = document.getElementById('pw-section');
  pw.style.display = 'block';

  const input = document.getElementById('pw-input');
  input.value = '';
  input.classList.remove('error');
  document.getElementById('error-msg').classList.remove('visible');
  document.getElementById('btn-login').disabled = false;
  input.focus();
}

// ========================================
// ログイン
// ========================================
async function doLogin() {
  if (!state.selectedEventId) { showToast('イベントを選択してください', 'error'); return; }

  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) {
    setError('パスワードを入力してください');
    return;
  }

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '確認中...';
  clearError();

  try {
    const data = await api('login', { eventId: state.selectedEventId, password: pw });
    state.session = data;
    sessionStorage.setItem('osanpo_session', JSON.stringify(data));
    await enterGallery();
  } catch(e) {
    setError(e.message || 'ログインに失敗しました');
    document.getElementById('pw-input').classList.add('error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.textContent = 'ギャラリーを開く';
  }
}

function setError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}
function clearError() {
  document.getElementById('error-msg').classList.remove('visible');
  document.getElementById('pw-input').classList.remove('error');
}

function togglePwVisibility() {
  const inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ========================================
// ギャラリー表示
// ========================================
async function enterGallery() {
  showScreen('gallery');
  document.getElementById('btn-logout').classList.add('visible');

  const ev = state.session.event;
  document.getElementById('gallery-event-name').textContent = ev.name;
  document.getElementById('gallery-subtitle').textContent =
    `${ev.count}枚 ｜ 写真をタップして選択 → まとめて購入できます`;

  await loadPhotos();
}

async function loadPhotos() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '<div class="loading-wrap" style="grid-column:1/-1"><div class="spinner"></div><p>写真を読み込み中...</p></div>';

  try {
    const data = await api('getPhotos', {
      eventId: state.selectedEventId,
      token: state.session.token
    });
    state.photos = data.photos || [];
    renderGrid();
  } catch(e) {
    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--danger)">${e.message}</p>`;
  }
}

function renderGrid() {
  const grid = document.getElementById('photo-grid');
  if (!state.photos.length) {
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--bark)">写真がありません</p>';
    return;
  }

  grid.innerHTML = state.photos.map((p, i) => `
    <div class="photo-item" id="item-${p.number}" onclick="toggleSelect('${p.number}')">
      <div class="photo-skeleton" id="skel-${p.number}"></div>
      <canvas id="canvas-${p.number}" width="300" height="400" style="display:none;width:100%;height:100%"></canvas>
      <div class="photo-check"></div>
      <span class="photo-num">IMG-${p.number}</span>
    </div>
  `).join('');

  // 順番に遅延ロード（サーバー負荷軽減）
  state.photos.forEach((p, i) => {
    setTimeout(() => loadPhotoWithWatermark(p), i * 80);
  });
}

// ========================================
// 透かし画像生成（Canvas API）
// ========================================
async function loadPhotoWithWatermark(photo) {
  const canvas = document.getElementById('canvas-' + photo.number);
  const skel = document.getElementById('skel-' + photo.number);
  if (!canvas) return;

  try {
    const img = new Image();
    img.crossOrigin = 'anonymous';

    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = photo.url;
    });

    const ctx = canvas.getContext('2d');
    canvas.width = img.naturalWidth || 300;
    canvas.height = img.naturalHeight || 400;

    // 元画像を描画
    ctx.drawImage(img, 0, 0);

    // 透かしテキストを斜めに繰り返し
    ctx.save();
    ctx.globalAlpha = CONFIG.WATERMARK_OPACITY;
    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx.font = `bold ${Math.round(canvas.width * 0.055)}px sans-serif`;
    ctx.rotate(-Math.PI / 6);

    const step = canvas.width * 0.55;
    for (let y = -canvas.height; y < canvas.height * 2; y += step * 0.7) {
      for (let x = -canvas.width; x < canvas.width * 2; x += step) {
        ctx.fillText(CONFIG.WATERMARK_TEXT, x, y);
      }
    }

    // 枠線で写真番号
    ctx.restore();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, canvas.height - 28, canvas.width, 28);
    ctx.fillStyle = 'white';
    ctx.font = `${Math.round(canvas.width * 0.045)}px sans-serif`;
    ctx.globalAlpha = 1;

    skel.style.display = 'none';
    canvas.style.display = 'block';

  } catch(e) {
    // ロード失敗時はプレースホルダー
    skel.style.background = 'var(--sand)';
    skel.style.animation = 'none';
    const num = document.querySelector('#item-' + photo.number + ' .photo-num');
    if (num) num.style.color = 'var(--bark)';
  }
}

// ========================================
// 選択管理
// ========================================
function toggleSelect(num) {
  if (state.selected.has(num)) {
    state.selected.delete(num);
    document.getElementById('item-' + num)?.classList.remove('selected');
  } else {
    state.selected.add(num);
    document.getElementById('item-' + num)?.classList.add('selected');
  }
  updateCart();
}

function updateCart() {
  const count = state.selected.size;
  const panel = document.getElementById('cart-panel');
  const selInfo = document.getElementById('selection-info');

  if (count === 0) {
    panel.classList.remove('visible');
    selInfo.textContent = '';
    return;
  }

  panel.classList.add('visible');
  selInfo.textContent = `${count}枚選択中`;

  // 料金計算
  const price = calcPrice(count);

  document.getElementById('cart-count').innerHTML = `${count}<span>枚</span>`;
  document.getElementById('cart-detail').innerHTML = formatPriceDetail(price);
  document.getElementById('cart-total').innerHTML = `¥${price.total.toLocaleString()}<small> (税込)</small>`;
}

// クライアント側料金計算（GAS側と同じロジック）
function calcPrice(qty) {
  const P = { DOWNLOAD_ALL: 2000, PACK10: 900, PACK5: 500, SINGLE: 140 };
  let pack10=0, pack5=0, single=0, total=0;

  if (qty>=20)       { total=P.DOWNLOAD_ALL; }
  else if (qty<=3)   { single=qty; total=qty*P.SINGLE; }
  else if (qty<=5)   { pack5=1; total=P.PACK5; }
  else if (qty===6)  { pack5=1; single=1; total=P.PACK5+P.SINGLE; }
  else if (qty===7)  { pack5=1; single=2; total=P.PACK5+P.SINGLE*2; }
  else if (qty<=10)  { pack10=1; total=P.PACK10; }
  else if (qty===11) { pack10=1; single=1; total=P.PACK10+P.SINGLE; }
  else if (qty===12) { pack10=1; single=2; total=P.PACK10+P.SINGLE*2; }
  else if (qty===13) { pack10=1; single=3; total=P.PACK10+P.SINGLE*3; }
  else if (qty<=15)  { pack10=1; pack5=1; total=P.PACK10+P.PACK5; }
  else if (qty===16) { pack10=1; pack5=1; single=1; total=P.PACK10+P.PACK5+P.SINGLE; }
  else if (qty===17) { pack10=1; pack5=1; single=2; total=P.PACK10+P.PACK5+P.SINGLE*2; }
  else if (qty===18) { pack10=1; pack5=1; single=3; total=P.PACK10+P.PACK5+P.SINGLE*3; }
  else if (qty===19) { pack10=1; pack5=1; single=4; total=P.PACK10+P.PACK5+P.SINGLE*4; }

  return { total, pack10, pack5, single };
}

function formatPriceDetail(price) {
  const parts = [];
  if (price.pack10) parts.push(`10枚セット×${price.pack10}`);
  if (price.pack5)  parts.push(`5枚セット×${price.pack5}`);
  if (price.single) parts.push(`単品×${price.single}枚`);
  if (!parts.length && price.total===2000) parts.push('丸ごとダウンロード');
  return parts.join('　');
}

// ========================================
// モーダル（動的Stripe PaymentLink生成）
// ========================================
function openPaymentModal(isAll) {
  state.downloadAll = isAll;
  const count = isAll ? state.session?.event?.count : state.selected.size;
  const price = isAll ? { total: 2000, pack10: 0, pack5: 0, single: 0 } : calcPrice(count);

  document.getElementById('modal-title').textContent =
    isAll ? '丸ごとダウンロード' : `${count}枚を購入`;

  document.getElementById('modal-desc').textContent =
    isAll
      ? `イベントの全写真（${count}枚）を高画質データでダウンロードできます。決済完了後、自動でメールをお送りします。`
      : `選択した${count}枚の高画質データをダウンロードできます。決済完了後、自動でダウンロードリンクをメールでお送りします。`;

  let breakdown = '';
  if (price.pack10) breakdown += `<div class="price-row"><span>10枚セット × ${price.pack10}</span><span>¥${(price.pack10 * 900).toLocaleString()}</span></div>`;
  if (price.pack5)  breakdown += `<div class="price-row"><span>5枚セット × ${price.pack5}</span><span>¥${(price.pack5 * 500).toLocaleString()}</span></div>`;
  if (price.single) breakdown += `<div class="price-row"><span>単品 × ${price.single}枚</span><span>¥${(price.single * 140).toLocaleString()}</span></div>`;
  if (isAll)        breakdown += `<div class="price-row"><span>全データ一括</span><span>¥2,000</span></div>`;
  breakdown += `<div class="price-row total"><span>合計</span><span>¥${price.total.toLocaleString()}</span></div>`;
  breakdown += `<div style="margin-top:12px"><label style="font-size:12px;color:var(--bark)">メールアドレス（ダウンロードリンク送付先）<br>
    <input type="email" id="buyer-email" placeholder="example@gmail.com"
      style="width:100%;margin-top:6px;padding:10px 14px;border:1.5px solid var(--sand);border-radius:8px;font-size:14px;font-family:var(--sans);background:var(--cream);color:var(--deep);outline:none">
  </label></div>`;

  document.getElementById('price-breakdown').innerHTML = breakdown;

  const btnStripe = document.getElementById('btn-stripe');
  btnStripe.href = '#';
  btnStripe.style.opacity = '1';
  btnStripe.style.pointerEvents = 'auto';
  btnStripe.onclick = (e) => { e.preventDefault(); doCreatePayment(isAll); };

  document.getElementById('modal-overlay').classList.add('visible');
}

async function doCreatePayment(isAll) {
  const email = document.getElementById('buyer-email')?.value?.trim();
  if (!email || !email.includes('@')) {
    showToast('メールアドレスを入力してください', 'error');
    return;
  }

  const btnStripe = document.getElementById('btn-stripe');
  btnStripe.textContent = '決済ページを準備中...';
  btnStripe.style.opacity = '0.7';
  btnStripe.style.pointerEvents = 'none';

  try {
    const photoNumbers = isAll ? [] : Array.from(state.selected);
    const qty = isAll ? state.session?.event?.count : state.selected.size;

    const data = await api('createPayment', {
      eventId: state.selectedEventId,
      token: state.session.token,
      photoNumbers: photoNumbers.join(','),
      qty: String(qty),
      email: email
    });

    closeModal();
    window.open(data.paymentUrl, '_blank');
    showToast('Stripeの決済ページに移動します。決済後、メールをご確認ください。', 'success');
  } catch(e) {
    showToast('エラー: ' + e.message, 'error');
  } finally {
    btnStripe.textContent = '💳 カードで支払う';
    btnStripe.style.opacity = '1';
    btnStripe.style.pointerEvents = 'auto';
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

function onStripeClick() {
  // doCreatePaymentに統合済み
}

// モーダル外クリックで閉じる
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ========================================
// ログアウト
// ========================================
function logout() {
  sessionStorage.removeItem('osanpo_session');
  state.session = null;
  state.selectedEventId = null;
  state.photos = [];
  state.selected.clear();
  document.getElementById('btn-logout').classList.remove('visible');
  document.getElementById('cart-panel').classList.remove('visible');
  showScreen('login');
  loadEvents();
}

// ========================================
// 画面切り替え
// ========================================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ========================================
// GAS API呼び出し（GETリクエスト）
// ========================================
async function api(action, params = {}) {
  const url = new URL(CONFIG.GAS_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

  const res = await fetch(url.toString(), {
    method: 'GET',
    redirect: 'follow'
  });

  if (!res.ok) throw new Error(`通信エラー: ${res.status}`);

  const data = await res.json();
  if (!data.ok) throw new Error(data.error || '不明なエラー');
  return data;
}

// ========================================
// トースト通知
// ========================================
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast visible ${type}`;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('visible'), 3500);
}

// ========================================
// ユーティリティ
// ========================================
function escHtml(str) {
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDate(d) {
  if (!d) return '';
  try {
    const date = new Date(d);
    return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
  } catch(e) { return String(d); }
}
